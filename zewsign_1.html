<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZEWSIGN</title>
<style>
  :root{
    --bg:#040406;
    --bg-soft:#0b0c10;
    --silver:#e9edf3;
    --silver-dim:#9aa3b2;
    --cyan:#5ad7ff;
    --violet:#9b7bff;
    --line:rgba(233,237,243,0.12);
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{
    background:var(--bg);
    color:var(--silver);
    font-family:'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
    min-height:100vh;
    overflow-x:hidden;
  }
  body{
    display:flex;
    align-items:center;
    justify-content:center;
    padding:40px 20px;
    position:relative;
  }

  /* background atmosphere */
  .bg-glow{
    position:fixed;
    inset:0;
    pointer-events:none;
    z-index:0;
    background:
      radial-gradient(circle at 50% 15%, rgba(90,215,255,0.10), transparent 45%),
      radial-gradient(circle at 80% 80%, rgba(155,123,255,0.08), transparent 50%);
  }
  .grid-lines{
    position:fixed;
    inset:0;
    z-index:0;
    pointer-events:none;
    background-image:
      linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
    background-size:42px 42px;
    mask-image:radial-gradient(circle at 50% 35%, black 0%, transparent 70%);
  }

  /* floating shards + particles */
  .field{
    position:fixed;
    inset:0;
    z-index:0;
    pointer-events:none;
    overflow:hidden;
  }
  .shard{
    position:absolute;
    background:linear-gradient(135deg, rgba(233,237,243,0.5), rgba(90,215,255,0.05));
    clip-path:polygon(50% 0%, 100% 30%, 65% 100%, 20% 80%);
    filter:blur(0.3px);
    opacity:0.12;
    animation:drift linear infinite;
  }
  .dot{
    position:absolute;
    width:3px;
    height:3px;
    border-radius:50%;
    background:var(--cyan);
    opacity:0.5;
    animation:floaty ease-in-out infinite;
  }
  @keyframes drift{
    0%{ transform:translateY(0) rotate(0deg); }
    100%{ transform:translateY(-120px) rotate(25deg); }
  }
  @keyframes floaty{
    0%,100%{ transform:translateY(0) translateX(0); opacity:0.25; }
    50%{ transform:translateY(-22px) translateX(8px); opacity:0.75; }
  }

  .card{
    position:relative;
    z-index:1;
    width:100%;
    max-width:380px;
    display:flex;
    flex-direction:column;
    align-items:center;
  }

  .reveal{
    opacity:0;
    transform:translateY(22px);
    animation:rise 0.7s cubic-bezier(.2,.8,.2,1) forwards;
  }
  @keyframes rise{
    to{ opacity:1; transform:translateY(0); }
  }

  /* Avatar */
  .avatar-wrap{
    position:relative;
    width:128px;
    height:128px;
    margin-bottom:22px;
  }
  .avatar-ring{
    position:absolute;
    inset:-2px;
    border-radius:50%;
    background:conic-gradient(from 0deg, var(--silver), var(--cyan), var(--silver-dim), var(--silver));
    filter:blur(0.3px);
    animation:spin 7s linear infinite;
    opacity:0.9;
  }
  @keyframes spin{ to{ transform:rotate(360deg); } }
  .avatar{
    position:absolute;
    inset:2.5px;
    border-radius:50%;
    overflow:hidden;
    background:var(--bg-soft);
    border:2px solid var(--bg);
  }
  .avatar img{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
  }
  .avatar-pulse{
    position:absolute;
    inset:-2px;
    border-radius:50%;
    border:1px solid var(--cyan);
    opacity:0;
    animation:pulse 2.6s ease-out infinite;
  }
  @keyframes pulse{
    0%{ transform:scale(0.96); opacity:0.5; }
    100%{ transform:scale(1.18); opacity:0; }
  }

  .name{
    font-size:26px;
    font-weight:800;
    letter-spacing:3px;
    text-transform:uppercase;
    background:linear-gradient(135deg, #ffffff 0%, var(--silver) 40%, var(--cyan) 100%);
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
    margin-bottom:6px;
    text-align:center;
  }

  .bolt{
    width:14px;
    height:22px;
    margin-bottom:14px;
    opacity:0.9;
    filter:drop-shadow(0 0 6px rgba(90,215,255,0.5));
    animation:flicker 3.2s ease-in-out infinite;
  }
  @keyframes flicker{
    0%,100%{ opacity:0.9; }
    50%{ opacity:0.55; }
    52%{ opacity:1; }
  }

  .bio{
    font-size:14px;
    line-height:1.6;
    color:var(--silver-dim);
    text-align:center;
    max-width:300px;
    margin-bottom:30px;
    letter-spacing:0.2px;
  }

  /* Social buttons */
  .links{
    width:100%;
    display:flex;
    flex-direction:column;
    gap:12px;
  }
  .link-btn{
    position:relative;
    width:100%;
    display:flex;
    align-items:center;
    gap:14px;
    padding:14px 18px;
    border-radius:14px;
    background:var(--bg-soft);
    border:1px solid var(--line);
    color:var(--silver);
    text-decoration:none;
    cursor:pointer;
    font-size:15px;
    font-weight:600;
    letter-spacing:0.3px;
    overflow:hidden;
    transform:translateZ(0) translateY(0);
    transition:transform 0.35s cubic-bezier(.2,.8,.2,1), border-color 0.35s, box-shadow 0.35s, background 0.35s;
  }
  .link-btn::before{
    content:"";
    position:absolute;
    inset:0;
    background:linear-gradient(120deg, rgba(90,215,255,0.0), rgba(90,215,255,0.10), rgba(155,123,255,0.0));
    transform:translateX(-100%);
    transition:transform 0.6s ease;
  }
  .link-btn:hover::before{ transform:translateX(100%); }
  .link-btn:hover{
    transform:translateY(-5px) scale(1.025);
    border-color:rgba(90,215,255,0.45);
    background:#10121a;
    box-shadow:
      0 14px 30px -10px rgba(0,0,0,0.6),
      0 0 0 1px rgba(90,215,255,0.08),
      0 0 24px rgba(90,215,255,0.18);
  }
  .link-btn:active{ transform:translateY(-2px) scale(0.99); }

  .link-icon{
    flex-shrink:0;
    width:38px;
    height:38px;
    border-radius:10px;
    display:flex;
    align-items:center;
    justify-content:center;
    background:rgba(255,255,255,0.04);
    transition:transform 0.35s cubic-bezier(.2,.8,.2,1), background 0.35s;
  }
  .link-btn:hover .link-icon{
    transform:translateZ(20px) scale(1.08);
    background:rgba(90,215,255,0.12);
  }
  .link-icon svg{ width:19px; height:19px; }

  .link-text{ flex:1; display:flex; flex-direction:column; gap:1px; transition:transform 0.35s cubic-bezier(.2,.8,.2,1); }
  .link-btn:hover .link-text{ transform:translateX(2px); }
  .link-label{ font-size:11px; color:var(--silver-dim); font-weight:500; letter-spacing:0.6px; text-transform:uppercase; }
  .link-value{ font-size:14.5px; color:var(--silver); font-weight:600; }

  .arrow{
    width:16px; height:16px;
    flex-shrink:0;
    opacity:0.4;
    transition:transform 0.35s cubic-bezier(.2,.8,.2,1), opacity 0.35s;
  }
  .link-btn:hover .arrow{ transform:translateX(4px); opacity:0.9; }

  /* Copy button for phone */
  .copy-btn{
    flex-shrink:0;
    width:38px;
    height:38px;
    border-radius:10px;
    border:1px solid var(--line);
    background:rgba(255,255,255,0.03);
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    color:var(--silver-dim);
    transition:all 0.25s ease;
    position:relative;
    z-index:2;
  }
  .copy-btn:hover{
    background:rgba(90,215,255,0.14);
    border-color:rgba(90,215,255,0.4);
    color:var(--cyan);
    transform:scale(1.08);
  }
  .copy-btn svg{ width:16px; height:16px; }
  .copy-toast{
    position:absolute;
    top:-34px;
    right:0;
    background:var(--cyan);
    color:#04101a;
    font-size:11px;
    font-weight:700;
    padding:5px 10px;
    border-radius:8px;
    opacity:0;
    transform:translateY(6px);
    transition:all 0.25s ease;
    pointer-events:none;
    white-space:nowrap;
  }
  .copy-toast.show{ opacity:1; transform:translateY(0); }

  .footer{
    margin-top:34px;
    font-size:11px;
    letter-spacing:3px;
    color:rgba(154,163,178,0.5);
    text-transform:uppercase;
  }

  @media (prefers-reduced-motion: reduce){
    *{ animation:none !important; transition:none !important; }
  }
</style>
</head>

<script>
  const field = document.getElementById('field');
  const shardCount = 10;
  const dotCount = 22;

  for (let i = 0; i < shardCount; i++){
    const s = document.createElement('div');
    s.className = 'shard';
    const size = 14 + Math.random() * 26;
    s.style.width = size + 'px';
    s.style.height = (size * 1.6) + 'px';
    s.style.left = Math.random() * 100 + '%';
    s.style.top = Math.random() * 100 + '%';
    s.style.animationDuration = (14 + Math.random() * 14) + 's';
    s.style.animationDelay = (Math.random() * -20) + 's';
    field.appendChild(s);
  }

  for (let i = 0; i < dotCount; i++){
    const d = document.createElement('div');
    d.className = 'dot';
    d.style.left = Math.random() * 100 + '%';
    d.style.top = Math.random() * 100 + '%';
    d.style.animationDuration = (3 + Math.random() * 4) + 's';
    d.style.animationDelay = (Math.random() * -6) + 's';
    field.appendChild(d);
  }

  const copyBtn = document.getElementById('copyBtn');
  const copyToast = document.getElementById('copyToast');
  const phoneValue = document.getElementById('phoneValue').textContent.trim();

  copyBtn.addEventListener('click', function(e){
    e.preventDefault();
    e.stopPropagation();
    navigator.clipboard.writeText(phoneValue.replace(/\s/g,'')).then(function(){
      copyToast.classList.add('show');
      setTimeout(function(){ copyToast.classList.remove('show'); }, 1600);
    }).catch(function(){
      copyToast.textContent = 'Не удалось';
      copyToast.classList.add('show');
      setTimeout(function(){ copyToast.classList.remove('show'); }, 1600);
    });
  });
</script>
